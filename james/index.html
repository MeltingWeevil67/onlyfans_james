<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
        }

        img {
            max-width: 100%;
            max-height: 100%;
            object-fit: cover;
			width: 100vw;
			height: 100vh;
        }
    </style>
</head>
<body>
    <img src="image.gif" alt="Displayed Image">
</body>
</html>
